<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="description" content="Wishy — สร้างพื้นที่ความสัมพันธ์ส่วนตัว แชร์และสุ่มของที่อยากได้ อยากกิน อยากไป">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wishy">

  <!-- Open Graph -->
  <meta property="og:title" content="Wishy — พื้นที่ความปรารถนา">
  <meta property="og:description" content="สร้างพื้นที่ความสัมพันธ์ส่วนตัว แชร์และสุ่มของที่อยากได้ อยากกิน อยากไป">
  <meta property="og:type" content="website">

  <title>Wishy — พื้นที่ความปรารถนา</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Google Fonts (preconnect for performance) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css?v=2">

  <style>
    /* Inline critical CSS for fastest paint */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0a1e;
      gap: 16px;
      transition: opacity 0.4s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      font-size: 3rem;
      animation: loadingPulse 1s ease-in-out infinite;
    }
    .loading-title {
      font-family: 'Prompt', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #f9a8d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .loading-bar-wrap {
      width: 120px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      border-radius: 2px;
      animation: loadingBar 1.5s ease-in-out infinite;
    }
    @keyframes loadingPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
    @keyframes loadingBar {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loading-logo">🌸</div>
    <div class="loading-title">Wishy</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- App shell -->
  <div id="app"></div>

  <!-- Toast container will be injected by Toast.init() -->

  <!-- Scripts (db first, then app) -->
  <script src="js/db.js?v=2"></script>
  <script src="js/app.js?v=2"></script>

  <script>
    // Hide loading screen after fonts + scripts loaded
    window.addEventListener('load', () => {
      setTimeout(() => {
        const screen = document.getElementById('loading-screen');
        if (screen) {
          screen.classList.add('fade-out');
          setTimeout(() => screen.remove(), 400);
        }
      }, 600);
    });
  </script>

</body>
</html>
